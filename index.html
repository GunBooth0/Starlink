<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Starlink</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --accent: #ffffff;
      --sidebar-bg: #111111;
      --card-bg: #1a1a1a;
      --hover: #333333;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 2rem;
      background: var(--sidebar-bg);
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 1.8rem;
      letter-spacing: 1px;
    }
    #user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.95rem;
    }
    #announcement {
      background: #222;
      color: #ffffff; /* WHITE as requested */
      text-align: center;
      padding: 0.8rem;
      font-weight: bold;
      display: none;
    }
    .container {
      display: flex;
      flex: 1;
    }
    aside {
      width: 260px;
      background: var(--sidebar-bg);
      padding: 1.5rem;
      border-right: 1px solid #222;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #categories-list {
      flex: 1;
    }
    .category {
      padding: 0.8rem 1rem;
      margin: 0.4rem 0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category:hover,
    .category.active {
      background: var(--hover);
    }
    .add-form {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #333;
    }
    .add-form input {
      width: 100%;
      margin-bottom: 0.5rem;
    }
    main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .site-card {
      background: var(--card-bg);
      padding: 1.2rem;
      border-radius: 8px;
      border: 1px solid #333;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .site-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .site-card h3 {
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }
    .site-card a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .site-card a:hover {
      text-decoration: underline;
    }
    #admin-section {
      display: none;
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 2rem;
    }
    #admin-section h2 {
      margin-bottom: 1.5rem;
    }
    button, input, textarea, select {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      margin: 0.5rem 0;
    }
    button {
      background: #333;
      cursor: pointer;
    }
    button:hover {
      background: #555;
    }
    .hidden { display: none !important; }
    .user-list {
      margin-top: 2rem;
    }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      background: #1a1a1a;
      margin-bottom: 0.5rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <!-- FIREBASE SETUP INSTRUCTIONS (READ THIS FIRST) -->
  <!-- 
  1. Go to https://console.firebase.google.com → Create project "Starlink"
  2. Project settings → Add app → Web → Name it "Starlink" → Copy the firebaseConfig object
  3. Paste it below where it says "PASTE YOUR FIREBASE CONFIG HERE"
  4. Authentication → Sign-in method → Enable "Google"
  5. Firestore Database → Create database (start in production mode)
     Set these rules in the Rules tab:
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /{document=**} {
           allow read, write: if request.auth != null;
         }
       }
     }
  6. Replace YOUR_ADMIN_EMAIL with the Google email you will sign in with
  7. After first sign-in, the site will work for everyone. Only YOUR email sees the Admin Panel.
  -->

  <div id="announcement"></div>

  <header>
    <div class="header-left">
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="white"/>
      </svg>
      <h1>Starlink</h1>
    </div>
    <div id="user-info">
      <span id="user-name">Not signed in</span>
      <button id="auth-btn" onclick="toggleAuth()">Sign in with Google</button>
    </div>
  </header>

  <div class="container">
    <aside>
      <div id="categories-list"></div>

      <!-- Public add category (visible after sign in) -->
      <div id="add-category-form" class="add-form hidden">
        <input type="text" id="new-category-name" placeholder="New category name" />
        <button onclick="addNewCategory()">+ Add Category</button>
      </div>

      <hr style="border-color:#333; margin:1.5rem 0;">
      <button onclick="showAdminPanel()" id="admin-menu-btn" class="hidden" style="width:100%; padding:1rem; font-size:1rem;">
        Admin Panel
      </button>
    </aside>

    <main>
      <!-- Browse mode (categories + sites) -->
      <div id="browse-main">
        <h2 id="current-category">Select a category</h2>
        
        <!-- Public add site form (visible after sign in + category selected) -->
        <div id="add-site-form" class="hidden" style="margin-bottom:1.5rem; padding:1rem; background:#111; border-radius:8px;">
          <h3>Add site to this category</h3>
          <input type="text" id="new-site-name" placeholder="Site name" style="width:48%; margin-right:2%;">
          <input type="text" id="new-site-url" placeholder="https://example.com" style="width:48%;">
          <button onclick="addNewSite()">+ Add Site</button>
        </div>

        <div class="sites-grid" id="sites-grid"></div>
      </div>

      <!-- Admin Panel (ONLY YOU see this) -->
      <div id="admin-section">
        <h2>Admin Panel</h2>
        
        <h3>Global Announcement (white text)</h3>
        <textarea id="announce-text" rows="3" placeholder="Type announcement here..."></textarea>
        <button onclick="saveAnnouncement()">Save Announcement</button>
        <button onclick="clearAnnouncement()">Clear Announcement</button>

        <div class="user-list" id="users-list-container">
          <h3 style="margin-top:2rem;">All Signed-in Users</h3>
          <div id="users-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK v12.10.0 (latest as of March 2026) - Compat for single HTML file -->
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

  <script>
    // ====================== YOUR CONFIG GOES HERE ======================
    const firebaseConfig = {
    apiKey: "AIzaSyDI979T4jI-ZbGbRDFo-kNZPyG3Pc8gkXw",
    authDomain: "starlink-42031.firebaseapp.com",
    projectId: "starlink-42031",
    storageBucket: "starlink-42031.firebasestorage.app",
    messagingSenderId: "264424976547",
    appId: "1:264424976547:web:6725648e3ae60397870f16",
    measurementId: "G-Z2B3TBENYK"
    };
    // ==================================================================

    // CHANGE THIS TO YOUR GOOGLE EMAIL (only you will see Admin Panel)
    const ADMIN_EMAIL = "gunnarbooth@gmail.com";

    // Global variables
    let app, auth, db;
    let currentUser = null;
    let currentCategoryId = null;
    let categories = [];
    let sites = [];
    let announcementText = "";
    let usersData = [];

    // Initialize Firebase
    function initFirebase() {
      if (!firebaseConfig.apiKey) {
        alert("Please paste your Firebase config in the code first!");
        return;
      }
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      // Auth state listener
      auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        const userNameEl = document.getElementById("user-name");
        const authBtn = document.getElementById("auth-btn");
        const addCatForm = document.getElementById("add-category-form");
        const adminBtn = document.getElementById("admin-menu-btn");

        if (user) {
          userNameEl.textContent = user.displayName || user.email;
          authBtn.textContent = "Sign Out";
          addCatForm.classList.remove("hidden");
          if (user.email === ADMIN_EMAIL) adminBtn.classList.remove("hidden");
          // Save/update user in Firestore
          await db.collection("users").doc(user.uid).set({
            email: user.email,
            displayName: user.displayName || "User",
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        } else {
          userNameEl.textContent = "Not signed in";
          authBtn.textContent = "Sign in with Google";
          addCatForm.classList.add("hidden");
          adminBtn.classList.add("hidden");
          hideAdminPanel();
        }
        renderCategories();
      });

      // Realtime listeners
      loadRealtimeData();
    }

    function loadRealtimeData() {
      // Categories
      db.collection("categories").orderBy("name").onSnapshot(snapshot => {
        categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCategories();
      });

      // Sites
      db.collection("sites").onSnapshot(snapshot => {
        sites = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (currentCategoryId) renderSites();
      });

      // Announcement
      db.collection("settings").doc("announcement").onSnapshot(doc => {
        announcementText = doc.exists ? (doc.data().text || "") : "";
        showAnnouncement();
      });

      // Users
      db.collection("users").orderBy("email").onSnapshot(snapshot => {
        usersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (document.getElementById("admin-section").style.display === "block") {
          renderUsersList();
        }
      });
    }

    function toggleAuth() {
      if (currentUser) {
        auth.signOut();
      } else {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert("Sign in error: " + err.message));
      }
    }

    // Render categories in sidebar (NO "Categories" header as requested)
    function renderCategories() {
      const list = document.getElementById("categories-list");
      list.innerHTML = "";
      if (categories.length === 0) {
        list.innerHTML = `<div style="padding:1rem; opacity:0.6;">No categories yet.<br>Sign in and add some!</div>`;
        return;
      }
      categories.forEach(cat => {
        const div = document.createElement("div");
        div.className = `category ${cat.id === currentCategoryId ? 'active' : ''}`;
        div.textContent = cat.name;
        div.onclick = () => {
          currentCategoryId = cat.id;
          renderCategories(); // refresh active state
          renderSites();
          document.getElementById("add-site-form").classList.toggle("hidden", !currentUser);
        };
        list.appendChild(div);
      });
    }

    function renderSites() {
      const grid = document.getElementById("sites-grid");
      const title = document.getElementById("current-category");
      grid.innerHTML = "";

      const cat = categories.find(c => c.id === currentCategoryId);
      title.textContent = cat ? cat.name : "Select a category";

      const filtered = sites.filter(s => s.categoryId === currentCategoryId);
      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; opacity:0.6; padding:2rem;">No sites yet in this category.</div>`;
        return;
      }
      filtered.forEach(site => {
        const card = document.createElement("div");
        card.className = "site-card";
        card.innerHTML = `
          <h3>${site.name}</h3>
          <a href="${site.url}" target="_blank">${site.url}</a>
        `;
        grid.appendChild(card);
      });
    }

    function showAnnouncement() {
      const el = document.getElementById("announcement");
      if (announcementText.trim()) {
        el.textContent = announcementText;
        el.style.display = "block";
      } else {
        el.style.display = "none";
      }
    }

    // Public add category (anyone signed in)
    async function addNewCategory() {
      if (!currentUser) {
        alert("Please sign in first");
        return;
      }
      const name = document.getElementById("new-category-name").value.trim();
      if (!name) return alert("Enter a name");
      await db.collection("categories").add({
        name: name,
        createdBy: currentUser.uid
      });
      document.getElementById("new-category-name").value = "";
      alert("Category added!");
    }

    // Public add site (anyone signed in, to current category)
    async function addNewSite() {
      if (!currentUser || !currentCategoryId) return;
      const name = document.getElementById("new-site-name").value.trim();
      const url = document.getElementById("new-site-url").value.trim();
      if (!name || !url) return alert("Fill both fields");
      await db.collection("sites").add({
        name: name,
        url: url.startsWith("http") ? url : "https://" + url,
        categoryId: currentCategoryId,
        createdBy: currentUser.uid
      });
      document.getElementById("new-site-name").value = "";
      document.getElementById("new-site-url").value = "";
      alert("Site added!");
    }

    // Admin only functions
    function showAdminPanel() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
        alert("Admin access restricted to owner only.");
        return;
      }
      document.getElementById("browse-main").style.display = "none";
      const adminSec = document.getElementById("admin-section");
      adminSec.style.display = "block";
      renderUsersList();
    }

    function hideAdminPanel() {
      document.getElementById("browse-main").style.display = "block";
      document.getElementById("admin-section").style.display = "none";
    }

    function saveAnnouncement() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      const text = document.getElementById("announce-text").value.trim();
      db.collection("settings").doc("announcement").set({ text: text }, { merge: true });
      alert("Announcement saved (white text)!");
    }

    function clearAnnouncement() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      db.collection("settings").doc("announcement").set({ text: "" });
      document.getElementById("announce-text").value = "";
    }

    function renderUsersList() {
      const container = document.getElementById("users-list");
      container.innerHTML = "";
      if (usersData.length === 0) {
        container.innerHTML = "<p>No users yet.</p>";
        return;
      }
      usersData.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-item";
        div.innerHTML = `
          <div>
            <strong>${user.displayName || user.email}</strong><br>
            <small>${user.email}</small>
          </div>
          <button onclick="deleteUser('${user.id}')" style="background:#c00;">Delete</button>
        `;
        container.appendChild(div);
      });
    }

    async function deleteUser(uid) {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      if (confirm("Delete this user from the list? (Does NOT delete their Google account)")) {
        await db.collection("users").doc(uid).delete();
      }
    }

    // Click outside admin to go back to browse
    document.addEventListener("click", (e) => {
      const admin = document.getElementById("admin-section");
      if (admin.style.display === "block" && !admin.contains(e.target) && e.target.id !== "admin-menu-btn") {
        hideAdminPanel();
      }
    });

    // Init everything
    window.onload = () => {
      initFirebase();
    };
  </script>
</body>
</html>
