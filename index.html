<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Starlink</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --glass-bg: rgba(20, 20, 35, 0.45);
      --text: #e0e0ff;
      --accent: #a5b4fc;
      --border: rgba(100, 100, 255, 0.18);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --blur: blur(12px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0f, #111122);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.2rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 2px 6px rgba(165,180,252,0.4));
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    #user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.95rem;
    }
    #announcement {
      background: rgba(30, 30, 60, 0.6);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: #ffffff;
      text-align: center;
      padding: 0.9rem;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    aside {
      width: 260px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    #categories-list .category {
      padding: 0.9rem 1.2rem;
      margin: 0.5rem 0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(40, 40, 70, 0.3);
      border: 1px solid var(--border);
    }
    #categories-list .category:hover,
    #categories-list .category.active {
      background: rgba(80, 80, 140, 0.4);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(100,100,255,0.15);
    }
    .add-form {
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .add-form input {
      width: 100%;
      margin-bottom: 0.8rem;
      background: rgba(30,30,50,0.6);
      border: 1px solid var(--border);
      backdrop-filter: var(--blur);
    }
    main {
      flex: 1;
      padding: 2.5rem;
      overflow-y: auto;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .site-card {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      padding: 1.5rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    .site-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      border-color: rgba(165,180,252,0.3);
    }
    .site-card h3 {
      margin-bottom: 0.6rem;
      font-size: 1.15rem;
      color: var(--accent);
    }
    .site-card a {
      color: #c7d2fe;
      text-decoration: none;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .site-card a:hover { text-decoration: underline; }
    #admin-section {
      display: none;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    button, input, textarea, select {
      background: rgba(30,30,60,0.7);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      margin: 0.6rem 0;
      backdrop-filter: var(--blur);
    }
    button {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { opacity: 0.9; transform: scale(1.02); }
    .hidden { display: none !important; }
    .user-list .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(40,40,70,0.4);
      margin-bottom: 0.8rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="announcement"></div>

  <header>
    <div class="header-left">
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#a5b4fc"/>
      </svg>
      <h1>Starlink</h1>
    </div>
    <div id="user-info">
      <span id="user-name">Not signed in</span>
      <button id="auth-btn" onclick="toggleAuth()">Sign in with Google</button>
    </div>
  </header>

  <div class="container">
    <aside>
      <div id="categories-list"></div>

      <div id="add-category-form" class="add-form hidden">
        <input type="text" id="new-category-name" placeholder="New category name" />
        <button onclick="addNewCategory()">+ Add Category</button>
      </div>

      <hr style="border-color:var(--border); margin:1.8rem 0;">
      <button onclick="showAdminPanel()" id="admin-menu-btn" class="hidden" style="width:100%; padding:1rem; font-size:1rem; background:linear-gradient(135deg, #4338ca, #6d28d9);">
        Admin Panel
      </button>
    </aside>

    <main>
      <div id="browse-main">
        <h2 id="current-category" style="margin-bottom:1.5rem; color:#c7d2fe;">Select a category</h2>
        
        <div id="add-site-form" class="hidden" style="margin-bottom:2rem; padding:1.5rem; background:var(--glass-bg); backdrop-filter:var(--blur); border-radius:16px; border:1px solid var(--border);">
          <h3 style="margin-bottom:1rem; color:var(--accent);">Add site to this category</h3>
          <input type="text" id="new-site-name" placeholder="Site name" style="width:48%; margin-right:2%;">
          <input type="text" id="new-site-url" placeholder="https://example.com" style="width:48%;">
          <button onclick="addNewSite()">+ Add Site</button>
        </div>

        <div class="sites-grid" id="sites-grid"></div>
      </div>

      <div id="admin-section">
        <h2 style="color:var(--accent);">Admin Panel</h2>
        
        <h3 style="margin:1.5rem 0 0.8rem;">Global Announcement</h3>
        <textarea id="announce-text" rows="3" placeholder="Type announcement here..."></textarea>
        <button onclick="saveAnnouncement()">Save Announcement</button>
        <button onclick="clearAnnouncement()" style="background:#dc2626;">Clear Announcement</button>

        <div class="user-list" id="users-list-container" style="margin-top:2.5rem;">
          <h3 style="margin-bottom:1rem; color:var(--accent);">All Signed-in Users</h3>
          <div id="users-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

  <script>
    // ====================== YOUR CONFIG GOES HERE ======================
    const firebaseConfig = {
  apiKey: "AIzaSyDI979T4jI-ZbGbRDFo-kNZPyG3Pc8gkXw",
  authDomain: "starlink-42031.firebaseapp.com",
  projectId: "starlink-42031",
  storageBucket: "starlink-42031.firebasestorage.app",
  messagingSenderId: "264424976547",
  appId: "1:264424976547:web:6725648e3ae60397870f16",
  measurementId: "G-Z2B3TBENYK"
};
    // ==================================================================

    const ADMIN_EMAIL = "gunnarbooth@gmail.com";  // ← your Google email

    let app, auth, db;
    let currentUser = null;
    let currentCategoryId = null;
    let categories = [];
    let sites = [];
    let announcementText = "";
    let usersData = [];

    function initFirebase() {
      if (!firebaseConfig.apiKey) {
        alert("Please paste your Firebase config!");
        return;
      }
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        const userNameEl = document.getElementById("user-name");
        const authBtn = document.getElementById("auth-btn");
        const addCatForm = document.getElementById("add-category-form");
        const adminBtn = document.getElementById("admin-menu-btn");

        if (user) {
          userNameEl.textContent = user.displayName || user.email;
          authBtn.textContent = "Sign Out";
          addCatForm.classList.remove("hidden");
          if (user.email === ADMIN_EMAIL) adminBtn.classList.remove("hidden");
          await db.collection("users").doc(user.uid).set({
            email: user.email,
            displayName: user.displayName || "User",
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        } else {
          userNameEl.textContent = "Not signed in";
          authBtn.textContent = "Sign in with Google";
          addCatForm.classList.add("hidden");
          adminBtn.classList.add("hidden");
          hideAdminPanel();
        }
        renderCategories();
      });

      loadRealtimeData();
    }

    function loadRealtimeData() {
      db.collection("categories").orderBy("name").onSnapshot(snap => {
        categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCategories();
      });

      db.collection("sites").onSnapshot(snap => {
        sites = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (currentCategoryId) renderSites();
      });

      db.collection("settings").doc("announcement").onSnapshot(doc => {
        announcementText = doc.exists ? (doc.data().text || "") : "";
        showAnnouncement();
      });

      db.collection("users").orderBy("email").onSnapshot(snap => {
        usersData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (document.getElementById("admin-section").style.display === "block") {
          renderUsersList();
        }
      });
    }

    function toggleAuth() {
      if (currentUser) {
        auth.signOut();
      } else {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => {
          console.error("Auth error:", err);
          if (err.code === 'auth/popup-blocked') {
            alert("Popup was blocked! Please allow popups for this site or disable ad blockers.");
          } else {
            alert("Sign in error: " + err.message);
          }
        });
      }
    }

    function renderCategories() {
      const list = document.getElementById("categories-list");
      list.innerHTML = "";
      if (categories.length === 0) {
        list.innerHTML = `<div style="padding:1.2rem; opacity:0.7; text-align:center;">No categories yet.<br>Sign in and add some!</div>`;
        return;
      }
      categories.forEach(cat => {
        const div = document.createElement("div");
        div.className = `category ${cat.id === currentCategoryId ? 'active' : ''}`;
        div.textContent = cat.name;
        div.onclick = () => {
          currentCategoryId = cat.id;
          renderCategories();
          renderSites();
          document.getElementById("add-site-form").classList.toggle("hidden", !currentUser);
        };
        list.appendChild(div);
      });
    }

    function renderSites() {
      const grid = document.getElementById("sites-grid");
      const title = document.getElementById("current-category");
      grid.innerHTML = "";

      const cat = categories.find(c => c.id === currentCategoryId);
      title.textContent = cat ? cat.name : "Select a category";

      const filtered = sites.filter(s => s.categoryId === currentCategoryId);
      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; opacity:0.7; padding:3rem;">No sites in this category yet.</div>`;
        return;
      }
      filtered.forEach(site => {
        const card = document.createElement("div");
        card.className = "site-card";
        card.innerHTML = `
          <h3>${site.name}</h3>
          <a href="${site.url}" target="_blank">${site.url}</a>
        `;
        grid.appendChild(card);
      });
    }

    function showAnnouncement() {
      const el = document.getElementById("announcement");
      if (announcementText.trim()) {
        el.textContent = announcementText;
        el.style.display = "block";
      } else {
        el.style.display = "none";
      }
    }

    async function addNewCategory() {
      if (!currentUser) return alert("Sign in first");
      const name = document.getElementById("new-category-name").value.trim();
      if (!name) return alert("Enter a name");
      await db.collection("categories").add({ name, createdBy: currentUser.uid });
      document.getElementById("new-category-name").value = "";
    }

    async function addNewSite() {
      if (!currentUser || !currentCategoryId) return;
      const name = document.getElementById("new-site-name").value.trim();
      const urlRaw = document.getElementById("new-site-url").value.trim();
      if (!name || !urlRaw) return alert("Fill both fields");
      const url = urlRaw.startsWith("http") ? urlRaw : "https://" + urlRaw;
      await db.collection("sites").add({
        name, url, categoryId: currentCategoryId, createdBy: currentUser.uid
      });
      document.getElementById("new-site-name").value = "";
      document.getElementById("new-site-url").value = "";
    }

    function showAdminPanel() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return alert("Admin only");
      document.getElementById("browse-main").style.display = "none";
      document.getElementById("admin-section").style.display = "block";
      renderUsersList();
    }

    function hideAdminPanel() {
      document.getElementById("browse-main").style.display = "block";
      document.getElementById("admin-section").style.display = "none";
    }

    function saveAnnouncement() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      const text = document.getElementById("announce-text").value.trim();
      db.collection("settings").doc("announcement").set({ text }, { merge: true });
    }

    function clearAnnouncement() {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      db.collection("settings").doc("announcement").set({ text: "" });
      document.getElementById("announce-text").value = "";
    }

    function renderUsersList() {
      const container = document.getElementById("users-list");
      container.innerHTML = "";
      if (usersData.length === 0) {
        container.innerHTML = "<p style='opacity:0.7;'>No users yet.</p>";
        return;
      }
      usersData.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-item";
        div.innerHTML = `
          <div>
            <strong>${user.displayName || user.email}</strong><br>
            <small style="opacity:0.7;">${user.email}</small>
          </div>
          <button onclick="deleteUser('${user.id}')" style="background:#dc2626;">Delete</button>
        `;
        container.appendChild(div);
      });
    }

    async function deleteUser(uid) {
      if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
      if (confirm("Delete this user record?")) {
        await db.collection("users").doc(uid).delete();
      }
    }

    document.addEventListener("click", (e) => {
      const admin = document.getElementById("admin-section");
      if (admin.style.display === "block" && !admin.contains(e.target) && e.target.id !== "admin-menu-btn") {
        hideAdminPanel();
      }
    });

    window.onload = initFirebase;
  </script>
</body>
</html>
