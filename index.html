<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --accent: 234 179 8;
        }
        
        [data-theme="dark"] {
            --bg: 9 9 11;
            --card: 24 24 27;
            --text: 255 255 255;
            --accent: 234 179 8;
        }
        
        [data-theme="light"] {
            --bg: 250 250 250;
            --card: 255 255 255;
            --text: 9 9 11;
            --accent: 234 179 8;
        }
        
        [data-theme="cosmic"] {
            --bg: 15 23 42;
            --card: 30 41 59;
            --text: 224 242 255;
            --accent: 147 197 253;
        }
        
        [data-theme="neon"] {
            --bg: 17 17 17;
            --card: 39 39 42;
            --text: 163 163 163;
            --accent: 163 230 77;
        }

        body {
            background: hsl(var(--bg));
            color: hsl(var(--text));
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .star-svg {
            filter: drop-shadow(0 0 15px rgb(234 179 8));
        }

        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-link:hover {
            transform: translateX(8px);
            color: rgb(234 179 8);
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        .tail-container {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- SIDEBAR -->
    <div class="w-72 bg-zinc-950 border-r border-white/10 flex flex-col fixed h-screen">
        <!-- Logo -->
        <div class="p-8 flex items-center gap-x-4 border-b border-white/10">
            <svg width="48" height="48" viewBox="0 0 200 200" class="star-svg" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 10 L120 70 L185 70 L130 110 L150 170 L100 135 L50 170 L70 110 L15 70 L80 70 Z" 
                      fill="#facc15" stroke="#fff" stroke-width="12" stroke-linejoin="round"/>
            </svg>
            <div>
                <h1 class="logo-font text-4xl font-semibold tracking-tighter text-white">Starlink</h1>
                <p class="text-[10px] text-yellow-400 tracking-[3px] -mt-1">GATEWAY TO THE STARS</p>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 px-6 py-8 overflow-y-auto">
            <div onclick="switchTab(0)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1 active-tab" id="tab-0">
                <i class="fa-solid fa-house w-5"></i>
                <span>Home</span>
            </div>
            <div onclick="switchTab(1)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-1">
                <i class="fa-solid fa-gamepad w-5"></i>
                <span>Games</span>
            </div>
            <div onclick="switchTab(2)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-2">
                <i class="fa-solid fa-brain w-5"></i>
                <span>AI Tools</span>
            </div>
            <div onclick="switchTab(3)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-3">
                <i class="fa-solid fa-tv w-5"></i>
                <span>TV & Streaming</span>
            </div>
            <div onclick="switchTab(4)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-4">
                <i class="fa-solid fa-shield-halved w-5"></i>
                <span>Proxies</span>
            </div>
            <div onclick="switchTab(5)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-5">
                <i class="fa-solid fa-music w-5"></i>
                <span>Music</span>
            </div>
            <div onclick="switchTab(6)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mt-6 border-t border-white/10 pt-4" id="tab-6">
                <i class="fa-solid fa-gear w-5"></i>
                <span>Settings</span>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 ml-72">
        <!-- Top Bar (cleaned up - only title and search) -->
        <div class="h-16 border-b border-white/10 bg-zinc-950/80 backdrop-blur-xl fixed w-[calc(100%-288px)] z-50">
            <div class="h-full px-10 flex items-center justify-between">
                <div class="flex items-center gap-x-8">
                    <div id="current-tab" class="text-2xl font-semibold logo-font tracking-tight">Home</div>
                    
                    <div class="relative w-96">
                        <input id="search-input" 
                               onkeyup="if(event.key === 'Enter') filterCards()"
                               type="text" 
                               placeholder="Search any site or category..." 
                               class="w-full bg-zinc-900 border border-white/20 rounded-3xl py-3 pl-12 pr-6 text-sm focus:outline-none focus:border-yellow-400">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-white/40"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="pt-24 pb-12 px-10 tail-container">
            
            <!-- HOME TAB (empty for now) -->
            <div id="content-0" class="tab-content">
                <!-- You can tell me what to put here next -->
            </div>

            <!-- GAMES TAB -->
            <div id="content-1" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-gamepad"></i> Games
                </h2>
                <div class="grid grid-cols-6 gap-6" id="games-grid"></div>
            </div>

            <!-- AI TAB -->
            <div id="content-2" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-brain"></i> AI Tools
                </h2>
                <div class="grid grid-cols-6 gap-6" id="ai-grid"></div>
            </div>

            <!-- TV TAB -->
            <div id="content-3" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-tv"></i> TV & Streaming
                </h2>
                <div class="grid grid-cols-6 gap-6" id="tv-grid"></div>
            </div>

            <!-- PROXIES TAB -->
            <div id="content-4" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-shield-halved"></i> Proxy Services
                </h2>
                <div class="grid grid-cols-6 gap-6" id="proxy-grid"></div>
            </div>

            <!-- MUSIC TAB -->
            <div id="content-5" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-music"></i> Music
                </h2>
                <div class="grid grid-cols-6 gap-6" id="music-grid"></div>
            </div>

            <!-- SETTINGS TAB -->
            <div id="content-6" class="tab-content hidden">
                <h2 class="text-4xl font-semibold mb-8 flex items-center gap-x-4">
                    <i class="fa-solid fa-gear"></i> Settings
                </h2>
                
                <div class="glass border border-white/10 rounded-3xl p-10 max-w-2xl mx-auto">
                    <h3 class="text-2xl font-semibold mb-6">Appearance</h3>
                    <p class="text-white/70 mb-8">Choose your preferred theme</p>
                    
                    <div class="grid grid-cols-4 gap-6">
                        <div onclick="setTheme('dark')" 
                             class="cursor-pointer rounded-2xl overflow-hidden border-2 border-transparent hover:border-yellow-400 transition-all shadow-lg">
                            <div class="h-32 bg-zinc-950 flex items-center justify-center">
                                <span class="text-yellow-400 text-6xl">★</span>
                            </div>
                            <div class="text-center py-4 text-base font-medium bg-zinc-900">Space Dark</div>
                        </div>
                        
                        <div onclick="setTheme('light')" 
                             class="cursor-pointer rounded-2xl overflow-hidden border-2 border-transparent hover:border-yellow-400 transition-all shadow-lg">
                            <div class="h-32 bg-white flex items-center justify-center border border-zinc-200">
                                <span class="text-yellow-400 text-6xl">★</span>
                            </div>
                            <div class="text-center py-4 text-base font-medium bg-white text-black">Classic Light</div>
                        </div>
                        
                        <div onclick="setTheme('cosmic')" 
                             class="cursor-pointer rounded-2xl overflow-hidden border-2 border-transparent hover:border-yellow-400 transition-all shadow-lg">
                            <div class="h-32 bg-slate-900 flex items-center justify-center">
                                <span class="text-sky-400 text-6xl">★</span>
                            </div>
                            <div class="text-center py-4 text-base font-medium bg-slate-900">Cosmic Blue</div>
                        </div>
                        
                        <div onclick="setTheme('neon')" 
                             class="cursor-pointer rounded-2xl overflow-hidden border-2 border-transparent hover:border-yellow-400 transition-all shadow-lg">
                            <div class="h-32 bg-neutral-950 flex items-center justify-center">
                                <span class="text-lime-400 text-6xl">★</span>
                            </div>
                            <div class="text-center py-4 text-base font-medium bg-neutral-950">Neon Glow</div>
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-white/10">
                        <h3 class="text-2xl font-semibold mb-6">Link Behavior</h3>
                        <div class="flex justify-between items-center py-4">
                            <div class="flex items-center gap-x-3 text-lg">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                <span>Open links in new tab</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked class="sr-only peer" id="newtab-toggle">
                                <div class="w-14 h-7 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-400"></div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 0;

        const sites = {
            games: [
                { name: "Poki", url: "https://poki.com", desc: "Thousands of free games", icon: "🎮" },
                { name: "CrazyGames", url: "https://crazygames.com", desc: "Browser hits", icon: "🚀" },
                { name: "itch.io", url: "https://itch.io", desc: "Indie games", icon: "🕹️" },
                { name: "Roblox", url: "https://roblox.com", desc: "Play with friends", icon: "📦" },
                { name: "Coolmath Games", url: "https://coolmathgames.com", desc: "School classics", icon: "🧠" },
                { name: "Minecraft Classic", url: "https://classic.minecraft.net", desc: "Free version", icon: "⛏️" }
            ],
            ai: [
                { name: "ChatGPT", url: "https://chatgpt.com", desc: "OpenAI", icon: "🤖" },
                { name: "Grok", url: "https://grok.x.ai", desc: "by xAI", icon: "⭐" },
                { name: "Claude", url: "https://claude.ai", desc: "Anthropic", icon: "🧠" },
                { name: "Gemini", url: "https://gemini.google.com", desc: "Google", icon: "🔭" },
                { name: "Perplexity", url: "https://perplexity.ai", desc: "Research AI", icon: "🔍" },
                { name: "Blackbox", url: "https://blackbox.ai", desc: "Code AI", icon: "💻" }
            ],
            tv: [
                { name: "YouTube", url: "https://youtube.com", desc: "Videos & Live", icon: "📺" },
                { name: "Tubi", url: "https://tubitv.com", desc: "Free movies", icon: "🎥" },
                { name: "Pluto TV", url: "https://pluto.tv", desc: "Live channels", icon: "📡" },
                { name: "Netflix", url: "https://netflix.com", desc: "Premium shows", icon: "🎬" },
                { name: "Disney+", url: "https://disneyplus.com", desc: "Family & Marvel", icon: "🏰" },
                { name: "Twitch", url: "https://twitch.tv", desc: "Live gaming", icon: "🎮" }
            ],
            proxies: [
                { name: "CroxyProxy", url: "https://www.croxyproxy.com", desc: "YouTube & more", icon: "🌐" },
                { name: "ProxySite", url: "https://www.proxysite.com", desc: "Fast & simple", icon: "⚡" },
                { name: "Hide.me", url: "https://hide.me/en/proxy", desc: "Privacy first", icon: "🕵️" },
                { name: "KProxy", url: "https://kproxy.com", desc: "No sign-up", icon: "🔑" },
                { name: "Proxyium", url: "https://proxyium.com", desc: "Ultra fast", icon: "🚀" },
                { name: "SudoProxy", url: "https://sudoproxy.net", desc: "School friendly", icon: "🏫" }
            ],
            music: [
                { name: "Spotify", url: "https://open.spotify.com", desc: "Millions of songs", icon: "🎵" },
                { name: "YouTube Music", url: "https://music.youtube.com", desc: "Free with ads", icon: "🎧" },
                { name: "SoundCloud", url: "https://soundcloud.com", desc: "Underground hits", icon: "🔊" },
                { name: "Bandcamp", url: "https://bandcamp.com", desc: "Support artists", icon: "💿" },
                { name: "Deezer", url: "https://deezer.com", desc: "High quality", icon: "📻" },
                { name: "iHeartRadio", url: "https://iheart.com", desc: "Live radio", icon: "📻" }
            ]
        };

        function switchTab(tabIndex) {
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('bg-white/10', 'active-tab');
            });
            
            document.getElementById(`tab-${tabIndex}`).classList.add('bg-white/10', 'active-tab');
            
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tabIndex}`).classList.remove('hidden');
            
            const titles = ["Home", "Games", "AI Tools", "TV & Streaming", "Proxies", "Music", "Settings"];
            document.getElementById('current-tab').textContent = titles[tabIndex];
            
            currentTab = tabIndex;
        }

        function populateGrid(category, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            sites[category].forEach(site => {
                const card = document.createElement('div');
                card.className = `card glass border border-white/10 rounded-3xl p-6 cursor-pointer group`;
                card.innerHTML = `
                    <div class="text-5xl mb-8 transition-transform group-hover:scale-125">${site.icon}</div>
                    <div class="font-semibold text-xl mb-1">${site.name}</div>
                    <div class="text-white/60 text-sm line-clamp-2">${site.desc}</div>
                `;
                card.onclick = () => {
                    const openInNew = document.getElementById('newtab-toggle').checked;
                    if (openInNew) {
                        window.open(site.url, '_blank');
                    } else {
                        window.location = site.url;
                    }
                };
                container.appendChild(card);
            });
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        }

        function filterCards() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            if (!term) return;
            
            let allSites = [];
            Object.keys(sites).forEach(cat => {
                allSites = allSites.concat(sites[cat]);
            });
            
            const match = allSites.find(site => 
                site.name.toLowerCase().includes(term) || 
                site.desc.toLowerCase().includes(term)
            );
            
            if (match) {
                window.open(match.url, '_blank');
                document.getElementById('search-input').value = '';
            }
        }

        function initialize() {
            populateGrid('games', 'games-grid');
            populateGrid('ai', 'ai-grid');
            populateGrid('tv', 'tv-grid');
            populateGrid('proxies', 'proxy-grid');
            populateGrid('music', 'music-grid');
            
            switchTab(0);
            document.getElementById('settings-modal')?.classList?.add('hidden');
            
            console.log('%cStarlink updated – clean sidebar + settings tab', 'color:#facc15; font-family:monospace');
        }

        window.onload = initialize;
    </script>
</body>
</html>
