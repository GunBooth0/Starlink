<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Tab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { margin:0; font-family:sans-serif; background:#000; color:#fff; }
        #top { position:fixed; top:0; width:100%; height:60px; background:#111; display:flex; align-items:center; padding:0 20px; box-sizing:border-box; z-index:10; }
        #sidebar { position:fixed; left:0; top:60px; width:250px; height:calc(100vh - 60px); background:#000; border-right:1px solid #333; overflow-y:auto; }
        .nav { padding:15px 20px; cursor:pointer; }
        .nav:hover, .active { background:#222; }
        #main { margin-left:250px; margin-top:60px; padding:20px; }
    </style>
</head>
<body>

<div id="top">
    <i id="current-icon" class="fa-solid fa-house text-2xl mr-3"></i>
    <div id="current-text" class="text-2xl">Home</div>
</div>

<div id="sidebar">
    <div class="nav" onclick="switchTab(0)"><i class="fa-solid fa-house"></i> Home</div>
    <div class="nav" onclick="switchTab(1)"><i class="fa-solid fa-gamepad"></i> Games</div>
    <div class="nav" onclick="switchTab(2)"><i class="fa-solid fa-brain"></i> AI Tools</div>
    <div class="nav" onclick="switchTab(3)"><i class="fa-solid fa-tv"></i> TV</div>
    <div class="nav" onclick="switchTab(4)"><i class="fa-solid fa-shield-halved"></i> Proxies</div>
    <div class="nav" onclick="switchTab(5)"><i class="fa-solid fa-music"></i> Music</div>
    <div class="nav" onclick="switchTab(6)"><i class="fa-solid fa-gear"></i> Settings</div>
    <div class="nav" onclick="switchTab(7)"><i class="fa-solid fa-user"></i> Account</div>
    <div class="nav" onclick="switchTab(8)"><i class="fa-solid fa-heart"></i> Credits</div>
</div>

<div id="main">
    <h1 id="page-title">Home Page</h1>
    <p>Content goes here</p>
</div>

<script>
const icons = [
    'fa-house', 'fa-gamepad', 'fa-brain', 'fa-tv', 'fa-shield-halved',
    'fa-music', 'fa-gear', 'fa-user', 'fa-heart'
];

const tabNames = [
    "Home", "Games", "AI Tools", "TV & Streaming", "Proxies",
    "Music", "Settings", "Account", "Credits"
];

function switchTab(index) {
    document.querySelectorAll('.nav').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav')[index].classList.add('active');

    document.getElementById('current-icon').className = `fa-solid ${icons[index]} text-2xl mr-3`;
    document.getElementById('current-text').textContent = tabNames[index];
    document.getElementById('page-title').textContent = tabNames[index] + " Page";
}

switchTab(0); // start on home
</script>
</body>
</html>
