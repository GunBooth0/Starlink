<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Starlink</title>

  <!-- Firebase Compat SDKs (works directly in browser / GitHub Pages) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    svg.star {
      width: 80px;
      height: 80px;
    }
    h1, h2, h3 { color: #ddd; }
    .section { margin: 30px 0; padding: 20px; background: #111; border-radius: 8px; }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #0080ff; }
    input, select {
      padding: 8px;
      margin: 6px;
      background: #222;
      color: white;
      border: 1px solid #444;
      border-radius: 4px;
    }
    a { color: #4da6ff; }
    #admin-area { display: none; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    th { background: #222; }
    .hidden { display: none; }
    hr { border-color: #333; }
  </style>
</head>
<body>

  <header>
    <svg class="star" viewBox="0 0 24 24" fill="white">
      <path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z"/>
    </svg>
    <h1>Starlink</h1>
  </header>

  <!-- Public content -->
  <div class="section" id="public-area">
    <div id="announcements">
      <p>Loading announcements...</p>
    </div>

    <h2>Categories & Sites</h2>
    <div id="categories-container">
      <p>Loading categories...</p>
    </div>

    <div style="margin-top: 30px;">
      <h3>Admin Login</h3>
      <input id="email" type="email" placeholder="Email" value="gunnarbooth@gmail.com" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <button onclick="logout()" id="logout-btn" class="hidden">Logout</button>
      <p id="auth-status" style="color:#ffcc00;"></p>
    </div>
  </div>

  <!-- Admin panel -->
  <div class="section" id="admin-area">
    <h2>Admin Panel</h2>
    <p id="admin-welcome"></p>

    <!-- Categories -->
    <h3>Categories</h3>
    <input id="new-cat-name" placeholder="New category name (e.g. Games)" />
    <button onclick="addCategory()">Add Category</button>
    <div id="categories-list"></div>

    <!-- Sites -->
    <h3>Add Site</h3>
    <input id="site-name" placeholder="Site name" />
    <input id="site-url" placeholder="https://example.com" />
    <input id="site-category" placeholder="Category name (must exist)" />
    <button onclick="addSite()">Add Site</button>

    <!-- Announcements -->
    <h3>Post Announcement</h3>
    <input id="announcement-text" placeholder="Announcement text..." style="width:80%;" />
    <button onclick="postAnnouncement()">Post</button>

    <!-- Users -->
    <h3>Registered Users</h3>
    <table id="users-table">
      <thead><tr><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>

    <button onclick="logout()">Logout</button>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Firebase Config (yours)
    // ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDI979T4jI-ZbGbRDFo-kNZPyG3Pc8gkXw",
      authDomain: "starlink-42031.firebaseapp.com",
      projectId: "starlink-42031",
      storageBucket: "starlink-42031.firebasestorage.app",
      messagingSenderId: "264424976547",
      appId: "1:264424976547:web:6725648e3ae60397870f16",
      measurementId: "G-Z2B3TBENYK"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const functions = firebase.functions();

    // ────────────────────────────────────────────────
    // VERY IMPORTANT: Replace this with your real UID
    // Steps:
    // 1. Log in once with your email
    // 2. Open browser console (F12)
    // 3. Type: firebase.auth().currentUser.uid
    // 4. Copy the long string and paste it here
    // ────────────────────────────────────────────────
    const ADMIN_UID = "PASTE_YOUR_UID_HERE";   // ←←← CHANGE THIS

    // ────────────────────────────────────────────────
    // Auth state change listener
    // ────────────────────────────────────────────────
    auth.onAuthStateChanged(async (user) => {
      const publicArea  = document.getElementById("public-area");
      const adminArea   = document.getElementById("admin-area");
      const authStatus  = document.getElementById("auth-status");
      const logoutBtn   = document.getElementById("logout-btn");

      if (user) {
        authStatus.textContent = `Logged in as: ${user.email}`;
        logoutBtn.classList.remove("hidden");

        if (user.uid === ADMIN_UID) {
          document.getElementById("admin-welcome").textContent = `Welcome, ${user.email}`;
          adminArea.style.display = "block";
          publicArea.style.display = "none";
          loadAdminData();
        } else {
          authStatus.textContent += " (not admin)";
          adminArea.style.display = "none";
          publicArea.style.display = "block";
        }
      } else {
        authStatus.textContent = "";
        logoutBtn.classList.add("hidden");
        adminArea.style.display = "none";
        publicArea.style.display = "block";
      }
    });

    // ────────────────────────────────────────────────
    // Load public data (announcements + categories + sites)
    // ────────────────────────────────────────────────
    function loadPublicData() {
      // Announcements
      db.collection("announcements")
        .orderBy("timestamp", "desc")
        .onSnapshot(snap => {
          let html = "";
          snap.forEach(doc => {
            html += `<p style="background:#222; padding:12px; border-radius:6px;">${doc.data().text}</p>`;
          });
          document.getElementById("announcements").innerHTML = 
            html || "<p>No announcements yet.</p>";
        });

      // Categories + grouped sites
      Promise.all([
        db.collection("categories").get(),
        db.collection("sites").get()
      ]).then(([catSnap, siteSnap]) => {
        const sitesByCat = {};
        siteSnap.forEach(doc => {
          const s = doc.data();
          if (!sitesByCat[s.category]) sitesByCat[s.category] = [];
          sitesByCat[s.category].push(
            `<a href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`
          );
        });

        let html = "";
        catSnap.forEach(doc => {
          const cat = doc.data().name;
          const sites = sitesByCat[cat] || [];
          html += `<h3>${cat}</h3><div>${sites.join(" • ") || "No sites yet"}</div><hr>`;
        });
        document.getElementById("categories-container").innerHTML = 
          html || "<p>No categories yet.</p>";
      }).catch(err => {
        console.error("Public load error:", err);
      });
    }

    // ────────────────────────────────────────────────
    // Load admin-only data
    // ────────────────────────────────────────────────
    function loadAdminData() {
      // Categories list
      db.collection("categories").onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
          html += `<div>${doc.data().name} <button onclick="deleteCategory('${doc.id}')">×</button></div>`;
        });
        document.getElementById("categories-list").innerHTML = html || "<p>No categories</p>";
      });

      // Users list
      db.collection("users").onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
          const data = doc.data();
          html += `<tr>
            <td>${data.email || "—"}</td>
            <td>
              <select onchange="changeRole('${doc.id}', this.value)">
                <option ${data.role === 'admin' ? 'selected' : ''}>admin</option>
                <option ${data.role === 'user'  ? 'selected' : ''}>user</option>
              </select>
            </td>
            <td><button onclick="deleteUser('${doc.id}')">Remove</button></td>
          </tr>`;
        });
        document.querySelector("#users-table tbody").innerHTML = html;
      });
    }

    // ────────────────────────────────────────────────
    // Auth actions
    // ────────────────────────────────────────────────
    window.login = () => {
      const email = document.getElementById("email").value.trim();
      const pass  = document.getElementById("password").value;
      if (!email || !pass) return alert("Enter email and password");

      auth.signInWithEmailAndPassword(email, pass)
        .catch(err => alert("Login failed:\n" + err.message));
    };

    window.logout = () => {
      auth.signOut().catch(err => console.error("Logout error:", err));
    };

    // ────────────────────────────────────────────────
    // Admin CRUD actions
    // ────────────────────────────────────────────────
    window.addCategory = async () => {
      const name = document.getElementById("new-cat-name").value.trim();
      if (!name) return;
      try {
        await db.collection("categories").add({ name });
        document.getElementById("new-cat-name").value = "";
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.deleteCategory = async (id) => {
      if (!confirm("Delete this category?")) return;
      try {
        await db.collection("categories").doc(id).delete();
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.addSite = async () => {
      const name = document.getElementById("site-name").value.trim();
      const url  = document.getElementById("site-url").value.trim();
      const cat  = document.getElementById("site-category").value.trim();

      if (!name || !url || !cat) return alert("Fill all fields");

      try {
        await db.collection("sites").add({ name, url, category: cat });
        document.getElementById("site-name").value = "";
        document.getElementById("site-url").value = "";
        document.getElementById("site-category").value = "";
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.postAnnouncement = async () => {
      const text = document.getElementById("announcement-text").value.trim();
      if (!text) return;
      try {
        await db.collection("announcements").add({
          text,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("announcement-text").value = "";
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.deleteUser = async (uid) => {
      if (!confirm("Permanently delete this user?")) return;
      try {
        const deleteFn = functions.httpsCallable("deleteUser");
        await deleteFn({ uid });
        alert("User deleted");
      } catch (err) {
        alert("Delete failed:\n" + err.message);
      }
    };

    window.changeRole = async (uid, newRole) => {
      try {
        const updateFn = functions.httpsCallable("updateUserRole");
        await updateFn({ uid, role: newRole });
      } catch (err) {
        alert("Role update failed:\n" + err.message);
      }
    };

    // Start loading public content right away
    loadPublicData();
  </script>
</body>
</html>
