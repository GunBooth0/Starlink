<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Starlink</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --accent: #ffffff;
      --sidebar-bg: #111111;
      --card-bg: #1a1a1a;
      --hover: #333333;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 2rem;
      background: var(--sidebar-bg);
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 1.8rem;
      letter-spacing: 1px;
    }
    #announcement {
      background: #222;
      color: #ffdd00;
      text-align: center;
      padding: 0.8rem;
      font-weight: bold;
      display: none;
    }
    .container {
      display: flex;
      flex: 1;
    }
    aside {
      width: 260px;
      background: var(--sidebar-bg);
      padding: 1.5rem;
      border-right: 1px solid #222;
      overflow-y: auto;
    }
    aside h2 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .category {
      padding: 0.8rem 1rem;
      margin: 0.4rem 0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category:hover,
    .category.active {
      background: var(--hover);
    }
    main {
      flex: 1;
      padding: 2rem;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .site-card {
      background: var(--card-bg);
      padding: 1.2rem;
      border-radius: 8px;
      border: 1px solid #333;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .site-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .site-card h3 {
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }
    .site-card a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .site-card a:hover {
      text-decoration: underline;
    }
    #admin-section {
      display: none;
      margin-top: 3rem;
      padding: 1.5rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
    }
    button, input, textarea {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      margin: 0.5rem 0;
    }
    button {
      background: #333;
      cursor: pointer;
    }
    button:hover {
      background: #555;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="announcement"></div>

  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="white"/>
    </svg>
    <h1>Starlink</h1>
  </header>

  <div class="container">
    <aside>
      <h2>Categories</h2>
      <div id="categories-list"></div>
    </aside>

    <main>
      <h2 id="current-category">Select a category</h2>
      <div class="sites-grid" id="sites-grid"></div>

      <div id="admin-section">
        <h2>Admin Panel (You only)</h2>
        <hr style="border-color:#444; margin:1.5rem 0;">

        <h3>Global Announcement</h3>
        <textarea id="announce-text" rows="2" placeholder="Type announcement here..."></textarea>
        <button onclick="saveAnnouncement()">Save Announcement</button>
        <button onclick="clearAnnouncement()">Clear</button>

        <!-- More admin features coming in next updates -->
      </div>
    </main>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Data structure (saved in localStorage)
    // ────────────────────────────────────────────────
    let data = {
      categories: [],           // [{name: "News", id: "c1"}, ...]
      sites: [],                // [{id:"s1", categoryId:"c1", name:"Example", url:"https://..."}]
      announcement: ""
    };

    const STORAGE_KEY = "starlinkData";

    // Load from localStorage or use default
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        data = JSON.parse(saved);
      }
      renderCategories();
      showAnnouncement();
      // For now admin always visible – later we'll hide behind password/prompt
      document.getElementById("admin-section").style.display = "block";
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ────────────────────────────────────────────────
    // Render functions
    // ────────────────────────────────────────────────
    function renderCategories() {
      const list = document.getElementById("categories-list");
      list.innerHTML = "";
      data.categories.forEach(cat => {
        const div = document.createElement("div");
        div.className = "category";
        div.textContent = cat.name;
        div.onclick = () => showCategory(cat.id);
        list.appendChild(div);
      });
    }

    let currentCatId = null;

    function showCategory(catId) {
      currentCatId = catId;
      const cat = data.categories.find(c => c.id === catId);
      document.getElementById("current-category").textContent = cat ? cat.name : "Select a category";

      const grid = document.getElementById("sites-grid");
      grid.innerHTML = "";

      const filtered = data.sites.filter(s => s.categoryId === catId);
      filtered.forEach(site => {
        const card = document.createElement("div");
        card.className = "site-card";
        card.innerHTML = `
          <h3>${site.name}</h3>
          <a href="${site.url}" target="_blank">${site.url}</a>
        `;
        grid.appendChild(card);
      });
    }

    function showAnnouncement() {
      const el = document.getElementById("announcement");
      if (data.announcement.trim()) {
        el.textContent = data.announcement;
        el.style.display = "block";
      } else {
        el.style.display = "none";
      }
    }

    // ────────────────────────────────────────────────
    // Admin actions (basic announcement for now)
    // ────────────────────────────────────────────────
    function saveAnnouncement() {
      const text = document.getElementById("announce-text").value.trim();
      data.announcement = text;
      saveData();
      showAnnouncement();
      alert("Announcement saved!");
    }

    function clearAnnouncement() {
      data.announcement = "";
      saveData();
      showAnnouncement();
      document.getElementById("announce-text").value = "";
    }

    // Init
    loadData();

    // For testing: add a sample category & site if empty
    if (data.categories.length === 0) {
      data.categories.push({ id: "c1", name: "Favorites" });
      data.sites.push({
        id: "s1",
        categoryId: "c1",
        name: "Google",
        url: "https://google.com"
      });
      saveData();
      loadData();
    }
  </script>
</body>
</html>
