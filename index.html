<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink</title>

    <!-- Favicon: white star -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><path d=%22M100 20 L120 80 L180 80 L135 115 L155 175 L100 140 L45 175 L65 115 L20 80 L80 80 Z%22 fill=%22%23ffffff%22/></svg>" type="image/svg+xml">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --accent: #ffffff;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;           /* ← keeps body locked */
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .star-svg {
            animation: pulse 4s infinite ease-in-out;
            filter: drop-shadow(0 0 20px var(--accent));
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 20px var(--accent)); }
            50%      { filter: drop-shadow(0 0 45px var(--accent)); }
        }

        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }
        
        .nav-link:hover,
        .nav-link.active-tab {
            color: var(--accent) !important;
            background: rgba(255,255,255,0.08);
        }

        .nav-link i {
            color: inherit;
        }

        #current-tab-icon,
        #current-tab {
            color: var(--accent);
            transition: color 0.4s ease;
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.12);
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--accent);
            background: rgba(255,255,255,0.06);
        }

        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .tail-container {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
        }

        #star-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: auto;
        }

        .star {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(110vh); }
            100% { transform: translateY(-30vh); }
        }

        /* Make main content scrollable */
        .main-content-wrapper {
            overflow-y: auto;
            height: 100vh;
            padding-top: 4rem; /* space for fixed top bar */
        }
    </style>
</head>
<body>

    <div id="star-bg"></div>

    <!-- SIDEBAR -->
    <div class="w-72 bg-black border-r border-white/10 flex flex-col fixed h-screen z-50">
        <!-- ... same sidebar code as before ... -->
        <div class="p-8 flex items-center gap-x-4 border-b border-white/10">
            <svg width="48" height="48" viewBox="0 0 200 200" class="star-svg" fill="var(--accent)" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 20 L120 80 L180 80 L135 115 L155 175 L100 140 L45 175 L65 115 L20 80 L80 80 Z" stroke="none"/>
            </svg>
            <div>
                <h1 class="logo-font text-4xl font-semibold tracking-tighter text-white">Starlink</h1>
                <p class="text-xs text-white/70 tracking-wide -mt-1">By: Gunnar Booth</p>
            </div>
        </div>

        <div class="flex-1 px-6 py-8 overflow-y-auto">
            <div onclick="switchTab(0)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1 active-tab" id="tab-0">
                <i class="fa-solid fa-house w-5"></i> <span>Home</span>
            </div>
            <div onclick="switchTab(1)" class="nav-link flex items-center gap-x-3 px-6 py-4 rounded-2xl text-lg font-medium cursor-pointer mb-1" id="tab-1">
                <i class="fa-solid fa-gamepad w-5"></i> <span>Games</span>
            </div>
            <!-- ... rest of sidebar links unchanged ... -->
        </div>
    </div>

    <!-- MAIN CONTENT - now scrollable -->
    <div class="flex-1 ml-72 main-content-wrapper">
        <div class="h-16 border-b border-white/10 bg-black/80 backdrop-blur-xl fixed w-[calc(100%-288px)] z-50 top-0">
            <div class="h-full px-10 flex items-center gap-4">
                <i id="current-tab-icon" class="text-3xl fa-solid"></i>
                <div id="current-tab" class="text-2xl font-semibold logo-font tracking-tight">Home</div>
            </div>
        </div>

        <div class="pt-24 pb-20 px-10 tail-container">
            <!-- HOME, GAMES, AI, TV, PROXIES, MUSIC content unchanged -->

            <!-- SETTINGS -->
            <div id="content-6" class="tab-content hidden">
                <div class="glass rounded-3xl p-10 max-w-4xl mx-auto">
                    <h3 class="text-2xl font-semibold mb-6">Appearance • Choose Theme</h3>
                    <p class="text-white/70 mb-8">Click a color to instantly change the accent, stars, glow, and sidebar highlights</p>
                    <div id="theme-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-5"></div>

                    <div class="mt-12 pt-8 border-t border-white/10">
                        <h3 class="text-2xl font-semibold mb-6">Link Behavior</h3>
                        <div class="flex justify-between items-center py-4">
                            <div class="flex items-center gap-x-3 text-lg">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                <span>Open links in new tab</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" id="newtab-toggle">
                                <div class="w-14 h-7 bg-white/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[var(--accent)]"></div>
                            </label>
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-white/10">
                        <h3 class="text-2xl font-semibold mb-6 text-red-400">Danger Zone</h3>
                        <button onclick="resetEverything()" class="bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-6 rounded-xl transition-colors">
                            Reset Everything (theme & preferences)
                        </button>
                        <p id="reset-message" class="text-sm text-white/60 mt-3 hidden">Settings reset! Refreshing page...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript remains unchanged from your last working version -->
    <script>
        // ... paste your full existing <script> block here (initialize, switchTab, populateGrid, etc.) ...
        // Make sure switchTab(0) is called in initialize() to always start on Home
    </script>
</body>
</html>
